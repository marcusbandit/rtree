name: Build and publish apt repository

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross-compilation tools (aarch64)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Set linker for aarch64
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb packages (amd64 + arm64)
        run: |
          cargo build --release --locked --target x86_64-unknown-linux-gnu
          cargo build --release --locked --target aarch64-unknown-linux-gnu
          cargo deb --no-build --target x86_64-unknown-linux-gnu
          cargo deb --no-build --target aarch64-unknown-linux-gnu

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.APT_SIGNING_KEY }}" | gpg --batch --import
          gpg --list-secret-keys

      - name: Checkout gh-pages (or create it)
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add apt-repo gh-pages
          else
            git worktree add --orphan apt-repo
            cd apt-repo && git checkout --orphan gh-pages
          fi

      - name: Add packages and rebuild repository index
        run: |
          mkdir -p apt-repo/pool/main/
          cp target/x86_64-unknown-linux-gnu/debian/*.deb  apt-repo/pool/main/
          cp target/aarch64-unknown-linux-gnu/debian/*.deb apt-repo/pool/main/

          # Copy public key so users can fetch it
          cp KEY.gpg apt-repo/KEY.gpg

          # Build per-arch Packages indices
          mkdir -p apt-repo/dists/stable/main/binary-amd64/
          mkdir -p apt-repo/dists/stable/main/binary-arm64/
          cd apt-repo
          dpkg-scanpackages --arch amd64 pool/main/ /dev/null \
            > dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages
          bzip2 -k -f dists/stable/main/binary-amd64/Packages
          dpkg-scanpackages --arch arm64 pool/main/ /dev/null \
            > dists/stable/main/binary-arm64/Packages
          gzip -k -f dists/stable/main/binary-arm64/Packages
          bzip2 -k -f dists/stable/main/binary-arm64/Packages

          # Build Release file
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="newtree" \
            -o APT::FTPArchive::Release::Label="newtree" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="amd64 arm64" \
            -o APT::FTPArchive::Release::Components="main" \
            -o APT::FTPArchive::Release::Description="newtree apt repository" \
            release dists/stable/ > dists/stable/Release

          # Sign Release
          echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
            --default-key "marcusbanditten@gmail.com" \
            --armor --detach-sign \
            -o dists/stable/Release.gpg dists/stable/Release
          echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
            --default-key "marcusbanditten@gmail.com" \
            --clearsign \
            -o dists/stable/InRelease dists/stable/Release

      - name: Commit and push to gh-pages
        run: |
          cd apt-repo
          git config user.name  "Marcus Rosado"
          git config user.email "marcusbanditten@gmail.com"
          git add -A
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          git commit -m "apt: publish newtree ${VERSION:-$(date +%Y%m%d)}" || echo "Nothing to commit"
          git push origin gh-pages
